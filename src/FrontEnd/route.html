<!DOCTYPE html>
<html>
<head>
    <title>PLAN YOUR ROUTE</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    <style>
        body {
            margin: 0;
            padding-top: 140px; 
            padding-left: 270px;
            padding-right: 20px;
            text-align: left;
            font-family: sans-serif;
        }

        /* Top Banner - Solid Green */
        .icon-banner {
            background-color: #2d5a27;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 120px; 
            display: flex;
            justify-content: space-between; 
            align-items: center;
            z-index: 1002; 
            box-sizing: border-box;
            padding-right: 30px;
        }

        .nav-group {
            display: flex;
            gap: 30px;
            padding-left: 15px;
        }

        /* Side Banner - Image */
        .side-banner {
            background-image: url('banner.jpg');
            background-size: cover;
            background-position: center;
            position: fixed;
            top: 120px; 
            left: 0;
            width: 250px;
            height: calc(100vh - 120px); 
            z-index: 1001; 
            box-sizing: border-box;
        }

        .nav-item, .profile-link {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: bold;
        }

        .material-symbols-outlined {
            font-size: 60px !important;
        }

        /* Main Layout Containers */
        .route-container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        /* Left Side: Inputs */
        .input-section {
            flex: 1;
            max-width: 350px;
            background: #f4f4f4;
            padding: 20px;
            border-radius: 8px;
        }

        .input-section h2 { margin-top: 0; color: #2d5a27; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        /* Right Side: Route List */
        .route-list {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .route-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border: 2px solid #e8f5e9;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .route-info h3 { margin: 0; color: #333; }
        .route-info p { margin: 5px 0 0; color: #2d5a27; font-weight: bold; }

        .go-button {
            background-color: #2d5a27;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .go-button:hover { background-color: #1e3d1a; }
        .go-button .material-symbols-outlined { font-size: 30px !important; }

    </style>
</head>
<body>

    <nav class="icon-banner">
        <div class="nav-group">
            <a href="map.html" class="nav-item">
                <span class="material-symbols-outlined">location_on</span>
                <span>Map</span>
            </a>
            <a href="leaderboard.html" class="nav-item">
                <span class="material-symbols-outlined">leaderboard</span>
                <span>Ranking</span>
            </a>
        </div>
        <a href="profile.html" class="profile-link">
            <span class="material-symbols-outlined">account_circle</span>
        </a>
    </nav>

    <nav class="side-banner"></nav>

    <h1>Plan Your Eco-Route</h1>
    
    <div class="route-container">
        <div class="input-section">
            <h2>Where to?</h2>
            <input type="text" placeholder="Starting Point...">
            <input type="text" placeholder="Destination...">
            <button style="width:100%; background:#2d5a27; color:white; border:none; padding:10px; margin-top:10px; border-radius:4px; cursor:pointer;">Find Routes</button>
        </div>

        <div class="route-list">
            <div class="route-card">
                <div class="route-info">
                    <h3>Scenic Greenway</h3>
                    <p>+50 Points</p>
                </div>
                <a href="map.html"><button class="go-button"><span class="material-symbols-outlined">arrow_forward</span></button></a>
            </div>

            <div class="route-card">
                <div class="route-info">
                    <h3>Main Street Bike Path</h3>
                    <p>+35 Points</p>
                </div>
                <a href="map.html"><button class="go-button"><span class="material-symbols-outlined">arrow_forward</span></button></a>
            </div>

            <div class="route-card">
                <div class="route-info">
                    <h3>Hillside Trail</h3>
                    <p>+80 Points</p>
                </div>
                <a href="map.html"><button class="go-button"><span class="material-symbols-outlined">arrow_forward</span></button></a>
            </div>
        </div>
    </div>

</body>
</html>
