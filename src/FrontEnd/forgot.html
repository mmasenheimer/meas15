<!DOCTYPE html>
<html>
<head>
    <title>FORGOT PASSWORD</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body {
            margin: 0;
            padding-top: 80px; /* Space for the 80px banner */
            padding-left: 20px;
            padding-bottom: 40px;
            text-align: left;
        }

        .icon-banner {
            background-color: #2d5a27;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 80px; 
            display: flex;
            justify-content: flex-end; /* Pushes back button to the right */
            align-items: center;
            z-index: 1000;
            box-sizing: border-box;
            padding-right: 30px; 
        }

        .nav-item {
            color: white;
            text-decoration: none;
            transition: opacity 0.2s, transform 0.2s;
        }

        .nav-item:hover {
            opacity: 0.7;
            transform: scale(1.1);
        }

        .material-symbols-outlined {
            font-size: 40px !important;
        }

        input {
            padding: 8px;
            width: 250px;
            margin-bottom: 10px;
        }

        button {
            margin: 10px;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="icon-banner">
        <a href="login.html" class="nav-item" title="Back to Login">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
    </nav>

    <h1>Forgot your password?</h1>
    <h3>It happens!</h3>
    
    <h3 id="exists" style="display: none; color: red;">Uh oh! Someone already has that username!</h3>
    
    <h2>Username</h2>
    <input type="text" id="username" name="username">
    
    <h2>Create New Password</h2>
    <input type="text" id="password" name="password"><br>
    
    <button>Reset Password</button>
    
    </body>
</html>
