<!DOCTYPE html>
<html>
    <head>
        <title>LOGIN PAGE</title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
        <style>
            body {
                margin: 0;
                padding-top: 80px; /* Space for the 80px banner */
                padding-left: 20px;
                padding-bottom: 40px;
                text-align: left;
            }

            .icon-banner {
                background-color: #2d5a27;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                width: 100%;
                height: 80px; 
                display: flex;
                justify-content: flex-end; /* Pushes icon to the right */
                align-items: center;
                z-index: 1000;
                box-sizing: border-box;
                padding-right: 30px; 
            }

            /* Profile icon styling (Not a button/link) */
            .profile-icon {
                color: white;
                cursor: default; 
            }

            .material-symbols-outlined {
                font-size: 40px !important;
            }

            input {
                padding: 8px;
                width: 250px;
                margin-bottom: 10px;
            }

            button {
                margin: 5px;
                padding: 10px 20px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <nav class="icon-banner">
            <div class="profile-icon">
                <span class="material-symbols-outlined">account_circle</span>
            </div>
        </nav>

        <h1>Welcome to ECO-Map!</h1>
        <h3>Ready to be more eco friendly?</h3>
        <h2>Username</h2>
        <input type = "text" id = "username" name = "username">
        <h2>Password</h2>
        <input type = "text" id = "password" name = "password"><br>
        <button id = "login-btn" >Log in</button><br>
        <button id = "forogt-btn" style="display: none;"> Forgot Password?</button><br>
        <a href="create.html">
            <button id="create-btn">Create new Account</button>
        </a>
        </body>
</html>
