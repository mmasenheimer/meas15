<!DOCTYPE html>
<html>
    <head>
        <title>CREATE NEW ACCOUNT</title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
        <style>
            body {
                margin: 0;
                /* Room for 120px top banner and 250px sidebar */
                padding-top: 140px; 
                padding-left: 270px;
                padding-right: 20px;
                padding-bottom: 40px;
                text-align: left;
            }

            /* Top Banner - Solid Green (Overlapping everything) */
            .icon-banner {
                background-color: #2d5a27;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                width: 100%;
                height: 120px; 
                display: flex;
                justify-content: space-between; 
                align-items: center;
                z-index: 1002; 
                box-sizing: border-box;
                padding-right: 30px;
            }

            /* Group for Nav Links - Pushed far left */
            .nav-group {
                display: flex;
                gap: 30px;
                padding-left: 15px;
            }

            /* Side Banner - Image (Sits below the top banner) */
            .side-banner {
                background-image: url('banner.jpg');
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                position: fixed;
                top: 120px; /* Starts below the green banner */
                left: 0;
                width: 250px;
                height: calc(100vh - 120px); 
                z-index: 1001; 
                box-sizing: border-box;
            }

            .nav-item, .profile-link {
                color: white;
                text-decoration: none;
                transition: transform 0.2s, opacity 0.2s;
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 18px;
                font-weight: bold;
            }

            .nav-item:hover, .profile-link:hover {
                opacity: 0.8;
                transform: scale(1.05);
            }

            /* Consistent Big Icon Size */
            .material-symbols-outlined {
                font-size: 60px !important;
            }

            input {
                padding: 10px;
                width: 300px;
                margin-bottom: 10px;
                border: 1px solid #ccc;
                border-radius: 4px;
            }

            button {
                margin-top: 20px;
                padding: 12px 24px;
                cursor: pointer;
                background-color: #2d5a27;
                color: white;
                border: none;
                border-radius: 4px;
                font-weight: bold;
            }

            button:hover {
                background-color: #1e3d1a;
            }

            h1 {
                margin-bottom: 5px;
            }

            h2 {
                margin-top: 20px;
                font-size: 1.2rem;
            }
        </style>
    </head>
    <body>
        <nav class="icon-banner">
            <div class="nav-group">
            </div>

            <a href="login.html" class="profile-link" title="View Profile">
                <span class="material-symbols-outlined">account_circle</span>
            </a>
        </nav>

        <nav class="side-banner"></nav>

        <h1>Create an account</h1>
        <h3>Are you ready to be more environmentally conscious?</h3>
        
        <h2>Username</h2>
        <input type="text" placeholder="Enter username">
        
        <h2>Password</h2>
        <input type="password" placeholder="Enter password"><br>
        
        <button id="create-btn">Create New Account</button>

    </body>
</html>
